<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trợ Lý Ảo Thầy Quân</title>
    <meta name="description" content="Kho ứng dụng, khóa học và phần mềm chất lượng cao. Trợ lý ảo hỗ trợ tối ưu hiệu suất công việc." />
    <meta property="og:title" content="Trợ Lý Ảo Thầy Quân" />
    <meta property="og:description" content="Kho ứng dụng, khóa học và phần mềm chất lượng cao." />
    <meta property="og:type" content="website" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              teal: {
                50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4',
                400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e',
                800: '#115e59', 900: '#134e4a',
              },
              stone: {
                50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e3', 300: '#d6d3d1',
                400: '#a8a29e', 500: '#78716c', 600: '#57534e', 700: '#44403c',
                800: '#292524', 900: '#1c1917', 950: '#0c0a09',
              },
            },
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Outfit', sans-serif; }

      /* ========== Dark mode base overrides ========== */
      .dark body,
      body.dark {
        background-color: #0c0a09;
        color: #e7e5e3;
      }

      /* Scrollbar dark */
      .dark ::-webkit-scrollbar-thumb { background: #57534e; }
      .dark ::-webkit-scrollbar-thumb:hover { background: #78716c; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #a8a29e; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #78716c; }

      @keyframes slideInRight {
        from { transform: translateX(120%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes fadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      /* Grain overlay */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 9999;
        pointer-events: none;
        opacity: 0.025;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      }

      /* Skeleton loading */
      .skeleton {
        background: linear-gradient(90deg, #f5f5f4 25%, #e7e5e3 50%, #f5f5f4 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
        border-radius: 0.5rem;
      }
      .dark .skeleton {
        background: linear-gradient(90deg, #292524 25%, #44403c 50%, #292524 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
        border-radius: 0.5rem;
      }

      /* Scroll reveal */
      .reveal {
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* Prevent FOUC */
      html.dark { color-scheme: dark; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4"
      }
    }
    </script>
  </head>
  <body class="bg-stone-50 text-stone-800 antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
